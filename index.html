<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloatCamera</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Camera Container -->
  <div id="camera-container" class="circle">
    <!-- Hidden video element for capturing -->
    <video id="video" autoplay playsinline muted></video>
    
    <!-- Canvas for rendering processed video -->
    <canvas id="output-canvas"></canvas>
    
    <!-- Hidden canvas for processing -->
    <canvas id="process-canvas" style="display:none;"></canvas>
    
    <!-- Overlay controls (shown on hover) -->
    <div id="controls-overlay">
      <!-- Top bar with close & minimize -->
      <div id="top-bar">
        <button id="btn-minimize" class="ctrl-btn" title="最小化">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="5" width="10" height="2" rx="1" fill="currentColor"/></svg>
        </button>
        <button id="btn-close" class="ctrl-btn" title="关闭">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      
      <!-- Bottom toolbar -->
      <div id="bottom-bar">
        <button id="btn-settings" class="tool-btn" title="设置面板">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <button id="btn-flip" class="tool-btn" title="镜像翻转">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M16 7l4 5-4 5M8 7L4 12l4 5"/></svg>
        </button>
        <button id="btn-screenshot" class="tool-btn" title="截图">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><circle cx="17" cy="8" r="1" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Flash effect for screenshot -->
  <div id="flash-overlay"></div>

  <!-- Loading indicator -->
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <p>正在加载中...</p>
  </div>

  <script src="node_modules/@tensorflow/tfjs-core/dist/tf-core.js"></script>
  <script src="node_modules/@tensorflow/tfjs-backend-webgl/dist/tf-backend-webgl.js"></script>
  <script src="node_modules/@tensorflow/tfjs-converter/dist/tf-converter.js"></script>
  <script src="node_modules/@tensorflow-models/body-segmentation/dist/body-segmentation.js"></script>
  <script src="node_modules/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
